server {
    listen 80;
    server_name localhost;
    root /var/www/backend/public

    # tells browser to cache static files for 30 days, when a visitor request them the browser fetchs them from memory
    # helps with the performance
    # access_log off means dont write in logs for these types of files
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 30d;
        access_log off;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    localtion ~ ^/index\.php(/|$) {
        fastcgi_pass riwaq_php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        #pass the visitor ip to the symfony aoo, instead of using the container ip in every request
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;

        # matching the php.ini configuration
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 300;

        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    # matching the php.ini configuration
    client_max_body_size 512M;

    server_tokens off;

    # Prevents clickjacking: where an attacker embeds your site invisibly and tricks users into clicking things.
    add_header X-Frame-Options "SAMEORIGIN";

    # Tells browsers: don't try to guess the content type of a response, trust what the server declares. Prevents attacks where a browser might execute a file as JavaScript when it shouldn't be.
    add_header X-Content-Type-Options "nosniff";

    # Activates the built-in XSS filter in older browsers. If a cross-site scripting attack is detected, the browser blocks the page from rendering entirely instead of trying to sanitize it.
    add_header X-XSS-Protection "1; mode=block";

    # Every HTTP request logged in this file. 
    access_log /var/log/nginx/riwaq_access.log;

    # All Nginx errors (connection failures, PHP timeouts, config problems) go here
    error_log  /var/log/nginx/riwaq_error.log;
}