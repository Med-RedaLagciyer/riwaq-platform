upload_max_filesize=512M
post_max_size=512M
memory_limit=512M
max_execution_time=300
display_errors=On
error_reporting=E_ALL
opcache.enable=1
opcache.validate_timestamps=1
max_file_uploads=20
expose_php=Off
opcache.max_accelerated_files=20000
realpath_cache_size=4096K
realpath_cache_ttl=600